---
layout: default
---

<article class="page-container fade-in">
  <header class="post-header">
    {% assign words = content | strip_html | number_of_words %}
    <span class="eyebrow"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time> &middot; {{ words | divided_by: 180 | at_least: 1 }} min read</span>
    <h1 class="post-title" style="view-transition-name: vt-{{ page.url | slugify }}">{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer mt-8">
    <a href="/blog/" class="btn btn-outline">&larr; All posts</a>
  </footer>
</article>
