---
layout: default
title: "Blog"
permalink: /blog/
---

<article class="page-container fade-in">
<div class="section-header">
    <span class="eyebrow">{{ site.posts | size }} entries &middot; <a href="{{ "/feed.xml" | relative_url }}">Atom</a></span>
    <h1 class="section-title">Updates</h1>
</div>

<div class="blog-list">
{% for post in site.posts %}
  <div class="blog-item">
    <time class="blog-date">{{ post.date | date: "%b %Y" }}</time>
    <div class="blog-content">
      <a href="{{ post.url | relative_url }}" class="blog-title" style="view-transition-name: vt-{{ post.url | slugify }}">{{ post.title }}</a>
      <p class="blog-excerpt">{{ post.excerpt | strip_html | truncate: 150 }}</p>
    </div>
  </div>
{% endfor %}
</div>
</article>
